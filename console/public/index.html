<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Azure Local Deployment Console</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font:16px/1.5 system-ui,sans-serif; background:#0b1020; color:#e8ecf5; }
    main { max-width:760px; margin:0 auto; padding:48px 24px; }
    h1 { font-size:1.6rem; margin:0 0 .5rem; }
    a.btn { display:inline-block; margin-top:1.5rem; padding:.7rem 1.2rem; border-radius:8px;
      background:#3b82f6; color:#fff; text-decoration:none; font-weight:600; }
    code { background:#161c30; padding:.15rem .4rem; border-radius:4px; }
    .status { margin-top:1.5rem; font-size:.9rem; color:#9aa5c0; }
  </style>
</head>
<body>
  <main>
    <h1>Azure Local Deployment Console</h1>
    <p>Multi-cluster Azure Local (HCI) deployment pipeline with intervention gates,
       wrapping the azure-local-2node-factory engine.</p>
    <p>Health: <code id="health">checking…</code></p>
    <a class="btn" href="/admin">Open operator console →</a>
    <p class="status">Public entry page. Operators sign in at <code>/admin</code>.</p>
  </main>
  <script>
    fetch('/api/health').then(function (r) { return r.json(); }).then(function (h) {
      var el = document.getElementById('health');
      el.textContent = h && h.db === 'up'
        ? 'ok · migration ' + (h.migration || '?') + ' · runs ' + h.activeRuns
        : 'degraded';
    }).catch(function () {
      document.getElementById('health').textContent = 'unreachable';
    });
  </script>
</body>
</html>
