# EXAMPLE ONLY — do not commit real secret values. Copy to a private location,
# fill in real values, and `kubectl apply` (or manage via a sealed-secret / external
# secret store). Names here MUST match the envFrom secretRef in deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: deploy-console-secrets
  namespace: azlocal-console
type: Opaque
stringData:
  # Postgres connection string (schema 'console'). Include sslmode as your PG requires.
  DATABASE_URL: "postgres://console:CHANGE_ME@postgres.azlocal-console.svc:5432/console?sslmode=require"

  # Bootstrap admin key: presented as the x-admin-key header, grants full caps.
  # Rotate by updating this secret + restarting the pod (no image rebuild).
  ADMIN_KEY: "CHANGE_ME_LONG_RANDOM_ADMIN_KEY"

  # Stripe API secret key (server side; billing). Never a publishable key here.
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"

  # Stripe webhook signing secret (whsec_...). Used to verify webhook signatures.
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
---
# Namespace declaration (apply once). Kept alongside the example so a fresh cluster
# has everything in one place; safe to apply repeatedly.
apiVersion: v1
kind: Namespace
metadata:
  name: azlocal-console